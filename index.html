<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LM Dashboard — Sign In</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: linear-gradient(135deg, #1B2A4A 0%, #2D4A7A 100%);
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
    }
    .card {
      background: #fff;
      border-radius: 16px;
      padding: 48px 40px;
      width: 100%; max-width: 420px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.25);
      text-align: center;
    }
    .logo {
      width: 64px; height: 64px;
      background: #EE4D2D;
      border-radius: 16px;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 24px;
      font-size: 28px; font-weight: 900; color: #fff;
    }
    h1 { font-size: 22px; font-weight: 700; color: #1B2A4A; margin-bottom: 6px; }
    .subtitle { font-size: 13px; color: #6B7280; margin-bottom: 36px; line-height: 1.5; }
    .btn-google {
      display: flex; align-items: center; justify-content: center; gap: 12px;
      width: 100%; padding: 14px 20px;
      background: #fff; border: 2px solid #E5E7EB;
      border-radius: 10px; cursor: pointer;
      font-size: 15px; font-weight: 600; color: #1B2A4A;
      transition: all 0.2s; text-decoration: none;
    }
    .btn-google:hover { border-color: #EE4D2D; background: #FFF5F3; }
    .btn-google svg { width: 20px; height: 20px; flex-shrink: 0; }
    .divider { height: 1px; background: #F3F4F6; margin: 28px 0; }
    .access-note {
      font-size: 12px; color: #6B7280;
      background: #F9FAFB; border-radius: 8px; padding: 12px 16px;
      line-height: 1.6;
    }
    .access-note strong { color: #1B2A4A; }
    .error-box {
      display: none;
      background: #FEF2F2; border: 1px solid #FCA5A5; border-radius: 8px;
      padding: 12px 16px; margin-bottom: 20px;
      font-size: 13px; color: #991B1B; line-height: 1.5;
    }
    .loading {
      display: none;
      font-size: 13px; color: #6B7280; margin-top: 16px;
    }
    #signInBtn { display: flex; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">LM</div>
    <h1>LM Weekly Dashboard</h1>
    <p class="subtitle">Sign in with your work Google account to access the Last Mile performance dashboard.</p>

    <div class="error-box" id="errorBox"></div>

    <button class="btn-google" id="signInBtn" onclick="signInWithGoogle()">
      <!-- Google "G" logo -->
      <svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
        <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
        <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
        <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
        <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.36-8.16 2.36-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
        <path fill="none" d="M0 0h48v48H0z"/>
      </svg>
      Sign in with Google
    </button>
    <div class="loading" id="loadingMsg">Signing you in...</div>

    <div class="divider"></div>
    <div class="access-note">
      Access is restricted to<br/>
      <strong>@spxexpress.com</strong> and <strong>@shopee.com</strong> accounts only.
    </div>
  </div>

  <!-- Firebase SDK (compat) -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

  <!-- Project config -->
  <script src="firebase-config.js"></script>

  <script>
    // ── Init Firebase ────────────────────────────────────────────────────────
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();

    // ── Check if already signed in ──────────────────────────────────────────
    auth.onAuthStateChanged(user => {
      if (user) {
        const domain = user.email.split('@')[1];
        if (ALLOWED_DOMAINS.includes(domain)) {
          window.location.href = 'dashboard.html';
        } else {
          auth.signOut();
          showError(`Access denied. Your account (${user.email}) is not authorised. Please use an @spxexpress.com or @shopee.com email.`);
        }
      }
    });

    // ── Google Sign-In ───────────────────────────────────────────────────────
    function signInWithGoogle() {
      const btn = document.getElementById('signInBtn');
      const loading = document.getElementById('loadingMsg');
      btn.style.display = 'none';
      loading.style.display = 'block';
      hideError();

      const provider = new firebase.auth.GoogleAuthProvider();
      provider.setCustomParameters({ hd: 'spxexpress.com' }); // hint to show work accounts first

      auth.signInWithPopup(provider)
        .then(result => {
          const domain = result.user.email.split('@')[1];
          if (!ALLOWED_DOMAINS.includes(domain)) {
            auth.signOut();
            showError(`Access denied. Your account (${result.user.email}) is not authorised. Please use an @spxexpress.com or @shopee.com email.`);
            btn.style.display = 'flex';
            loading.style.display = 'none';
          }
          // If domain is valid, onAuthStateChanged will redirect
        })
        .catch(err => {
          btn.style.display = 'flex';
          loading.style.display = 'none';
          if (err.code !== 'auth/popup-closed-by-user') {
            showError('Sign-in failed: ' + err.message);
          }
        });
    }

    function showError(msg) {
      const box = document.getElementById('errorBox');
      box.textContent = msg;
      box.style.display = 'block';
    }
    function hideError() {
      document.getElementById('errorBox').style.display = 'none';
    }
  </script>
</body>
</html>
